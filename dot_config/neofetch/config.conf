# See this wiki page for more info:
# https://github.com/dylanaraps/neofetch/wiki/Customizing-Info

print_info() {
    info title
    info underline

    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "Resolution" resolution
    info "DE" de
    info "WM" wm
    info "WM Theme" wm_theme
    info "Theme" theme
    info "Icons" icons
    info "Terminal" term
    info "Terminal Font" term_font
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory

    # info "GPU Driver" gpu_driver  # Linux/macOS only
    # info "CPU Usage" cpu_usage
    # info "Disk" disk
    # info "Battery" battery
    # info "Font" font
    # info "Song" song
    # info "Local IP" local_ip
    # info "Public IP" public_ip
    # info "Users" users
    # info "Locale" locale  # This only works on glibc systems.
}


# Title


# Hide/Show Fully qualified domain name.
#
# Default:  'off'
# Values:   'on', 'off'
# Flag:     --title_fqdn
title_fqdn="off"


# Hide/Show which user is logged in. When 'on' the username is shown at the top
# of the output, above all other info. When 'off' the username is not shown.
#
# Default:  'off'
# Values:   'on', 'off'
# Flag:     --show_username
show_username="off"


# Underline the title. When 'on' the title is underlined with the color
# specified by '--underline_char'. When 'off' the title is not underlined.
#
# Default:  'on'
# Values:   'on', 'off'
# Flag:     --underline_title
underline_title="on"


# Set the title underline character.
#
# Default:  '-'
# Values:   'string'
# Flag:     --underline_char
underline_char="-"


# Alignment
#
# Default: 'left'
# Values: 'left', 'right', 'auto'
# Flag: --align
align="left"


# Color Blocks


# Color block range
# The range of colors to print.
#
# Default: '0', '15'
# Values:  'num'
# Flag:    --block_range
block_range=(0 15)


# Toggle color blocks
#
# Default:  'on'
# Values:   'on', 'off'
# Flag:     --color_blocks
color_blocks="on"


# Color block width in spaces
#
# Default: 3
# Values:  'num'
# Flag:    --block_width
block_width=3


# Color block height in lines
#
# Default: 1
# Values:  'num'
# Flag:    --block_height
block_height=1


# Progress Bars


# Bar characters
#
# Default: '-', '='
# Values:  'string', 'string'
# Flag:    --bar_char
bar_char=("-" "=")


# Toggle Bar border
#
# Default: on
# Values:  'on', 'off'
# Flag:    --bar_border
bar_border="on"


# Progress bar length in spaces
# Number of chars long to make the progress bars.
#
# Default: 15
# Values:  'num'
# Flag:    --bar_length
bar_length=15


# Progress bar colors
# When set to distro, uses your distro's logo colors.
#
# Default: 'distro', 'distro'
# Values:  'distro', 'num'
# Flag:    --bar_colors
bar_colors=(distro distro)


# Info display
# Display a bar with the info.
#
# Default: 'off'
# Values:  'bar', 'infobar', 'barinfo', 'off'
# Flag:    --memory_display
memory_display="off"


# Backend Settings


# Image backend.
#
# Default:  'ascii'
# Values:   'ascii', 'caca', 'chafa', 'jp2a', 'iterm2', 'off',
#           'pot', 'termpix', 'pixterm', 'tycat', 'w3m', 'kitty',
#           'ueberzug', 'ueberzugpp', 'viu'
# Flag:     --backend
image_backend="ascii"


# Image Source
#
# Which image or ascii file to display.
#
# Default: 'auto'
# Values:  'auto', 'ascii', 'wallpaper', '/path/to/img', '/path/to/ascii', '/path/to/dir/'
#          'command output (neofetch --ascii "$(fortune | cowsay -W 30)")'
# Flag:    --source
image_source="auto"


# Ascii Options


# Ascii distro
# Which distro's ascii art to display.
#
# Default: 'auto'
# Values:  'auto', 'distro_name'
# Flag:    --ascii_distro
ascii_distro="auto"


# Ascii Colors
#
# Default:  'distro'
# Values:   'distro', 'num' 'num' 'num' 'num' 'num' 'num'
# Flag:     --ascii_colors
ascii_colors=(distro)


# Bold ascii logo
# Whether or not to bold the ascii logo.
#
# Default: 'on'
# Values:  'on', 'off'
# Flag:    --ascii_bold
ascii_bold="on"


# Image Options


# Image loop
# Setting this to on will make neofetch redraw the image constantly until
# Ctrl+C is pressed. This fixes display issues in some terminal emulators.
#
# Default:  'off'
# Values:   'on', 'off'
# Flag:     --loop
image_loop="off"


# Thumbnail directory
#
# Default: '~/.cache/thumbnails/neofetch'
# Values:  'dir'
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"


# Crop mode
#
# Default:  'normal'
# Values:   'normal', 'fit', 'fill'
# Flag:     --crop_mode
crop_mode="normal"


# Crop offset
# Note: Only affects 'normal' crop mode.
#
# Default:  'center'
# Values:   'northwest', 'north', 'northeast', 'west', 'center'
#           'east', 'southwest', 'south', 'southeast'
# Flag:     --crop_offset
crop_offset="center"


# Image size
# The image is half the terminal width by default.
#
# Default: 'auto'
# Values:  'auto', '00px', '00%', 'none'
# Flag:    --image_size
image_size="auto"


# Gap between image and text
#
# Default: '3'
# Values:  'num', '-num'
# Flag:    --gap
gap=3


# Image offsets
# Only works with the w3m backend.
#
# Default: '0'
# Values:  'px'
# Flag:    --xoffset
yoffset=0
xoffset=0


# Image background color
# Only works with the w3m backend.
#
# Default: ''
# Values:  'color', 'blue'
# Flag:    --bg_color
background_color=


# Misc Options

# Stdout mode
# Turn off all colors and disables image backend (ASCII/Image).
# Useful for piping into another command.
# Default: 'off'
# Values: 'on', 'off'
stdout="off"
